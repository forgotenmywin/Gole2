name: Pipedream OAuth TEST
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: 🔍 Test API
      env:
        CLIENT_ID: ${{ secrets.PIPEDREAM_CLIENT_ID }}
        CLIENT_SECRET: ${{ secrets.PIPEDREAM_CLIENT_SECRET }}
      run: |
        echo "😴 ۳۰s صبر..."
        sleep 30
        echo "=== CLIENT INFO ==="
        echo "ID: ${CLIENT_ID:0:12}... Length: ${#CLIENT_ID}"
        echo "SECRET Length: ${#CLIENT_SECRET}"
        
        echo "=== CURL RESULT ==="
        curl -s -i -w "\n=== STATUS: %{http_code} ===" \
          -X POST https://api.pipedream.com/v1/oauth/token \
          -u "${CLIENT_ID}:${CLIENT_SECRET}" \
          -d "grant_type=client_credentials"
