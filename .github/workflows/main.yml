name: Test Pipedream Auth
on: [workflow_dispatch]  # Manual trigger

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Test Pipedream OAuth
      env:
        CLIENT_ID: ${{ secrets.PIPEDREAM_CLIENT_ID }}
        CLIENT_SECRET: ${{ secrets.PIPEDREAM_CLIENT_SECRET }}
      run: |
        echo "🧪 Testing Client ID: ${CLIENT_ID:0:10}..."
        echo "🔐 Secret length: ${#CLIENT_SECRET}"
        
        RESPONSE=$(curl -s -w "\nHTTP_CODE:%{http_code}" \
          -X POST https://api.pipedream.com/oauth/token \
          -d "client_id=$CLIENT_ID" \
          -d "client_secret=$CLIENT_SECRET" \
          -d "grant_type=client_credentials" \
          -H "Content-Type: application/x-www-form-urlencoded")
          
        echo "$RESPONSE"
        echo "✅ SUCCESS" || echo "❌ FAILED"
