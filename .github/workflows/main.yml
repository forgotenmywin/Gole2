name: 📋 List Workflows & Components
on: [push]
jobs:
  explore:
    runs-on: ubuntu-latest
    steps:
    - name: 🔐 Token
      id: token
      env:
        CLIENT_ID: ${{ secrets.PIPEDREAM_CLIENT_ID }}
        CLIENT_SECRET: ${{ secrets.PIPEDREAM_CLIENT_SECRET }}
      run: |
        TOKEN=$(curl -s \
          -X POST https://api.pipedream.com/v1/oauth/token \
          -u "${CLIENT_ID}:${CLIENT_SECRET}" \
          -d 'grant_type=client_credentials' | jq -r '.access_token')
        echo "token=$TOKEN" >> $GITHUB_OUTPUT

    - name: 🔍 Explore Resources
      env:
        ACCESS_TOKEN: ${{ steps.token.outputs.token }}
      run: |
        echo "=== 1. User Info ==="
        curl -s -H "Authorization: Bearer $ACCESS_TOKEN" \
          https://api.pipedream.com/v1/user | jq .

        echo "=== 2. Teams ==="
        curl -s -H "Authorization: Bearer $ACCESS_TOKEN" \
          https://api.pipedream.com/v1/teams | jq '.data[]? | .name'

        echo "=== 3. Connected Apps ==="
        curl -s -H "Authorization: Bearer $ACCESS_TOKEN" \
          https://api.pipedream.com/v1/integrations | \
        jq '.data[]? | select(.provider == "github") | {name, id}'
