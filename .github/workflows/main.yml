name: 📋 List All Projects
on: [push]
jobs:
  list:
    runs-on: ubuntu-latest
    steps:
    - name: 📦 Setup
      run: sudo apt-get install -y jq

    - name: 🔐 Token
      id: token
      env:
        CLIENT_ID: ${{ secrets.PIPEDREAM_CLIENT_ID }}
        CLIENT_SECRET: ${{ secrets.PIPEDREAM_CLIENT_SECRET }}
      run: |
        RESPONSE=$(curl -s \
          -X POST https://api.pipedream.com/v1/oauth/token \
          -u "${CLIENT_ID}:${CLIENT_SECRET}" \
          -d 'grant_type=client_credentials')
        TOKEN=$(echo "$RESPONSE" | jq -r '.access_token')
        echo "token=$TOKEN" >> $GITHUB_OUTPUT

    - name: 📋 List ALL Projects
      env:
        ACCESS_TOKEN: ${{ steps.token.outputs.token }}
      run: |
        echo "=== YOUR PROJECTS ==="
        RESPONSE=$(curl -s \
          -H "Authorization: Bearer $ACCESS_TOKEN" \
          https://api.pipedream.com/v1/projects)
        
        echo "$RESPONSE" | jq '.data[]? | {id, name}'
        
        COUNT=$(echo "$RESPONSE" | jq '.data | length')
        echo "Total projects: $COUNT"
        
        # Search for similar
        echo "$RESPONSE" | jq -r '.data[]? | select(.id | contains("AVsi")) | .id + " → " + .name'
