name: 🔍 Client ID Test
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - run: |
        echo "🔍 CLIENT_ID: ${{ secrets.CLIENT_ID }}"
        echo "🔍 Length: ${#CLIENT_ID}"
        
        RESPONSE=$(curl -s -w "\nSTATUS:%{http_code}" \
          "https://api.pipedream.com/v1/clients/${{ secrets.CLIENT_ID }}" \
          -H "Authorization: Bearer ${{ secrets.CLIENT_SECRET }}")
        
        echo "🌐 Client API:"
        echo "$RESPONSE"
