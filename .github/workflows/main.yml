name: 🔍 Pipedream Test
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - run: |
        curl -k -X POST https://o_zwIrG4g.m.pipedream.net \
        -H "Content-Type: application/json" \
        -d '{"client_id":"${{ secrets.CLIENT_ID }}","test":true}' > result.txt
    - run: |
        echo "✅ Status: $(cat result.txt)"
        echo -e "# Pipedream Test\n## \`\`\`json\n$(cat result.txt)\n\`\`\`" >> $GITHUB_STEP_SUMMARY
    - name: Save Report
      run: |
        git config user.name "GitHub Action"
        git config user.email "action@github.com"
        echo "$(cat result.txt)" > 📋-report.txt
        git add 📋-report.txt
        git diff --staged --quiet || git commit -m "📋 Test result" && git push
