name: 🔍 Pipedream Project Checker
on: [push]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
    - name: 📦 Setup
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y jq curl

    - name: 🔐 OAuth Token
      id: token
      env:
        CLIENT_ID: ${{ secrets.PIPEDREAM_CLIENT_ID }}
        CLIENT_SECRET: ${{ secrets.PIPEDREAM_CLIENT_SECRET }}
      run: |
        # Check secrets
        if [ -z "$CLIENT_ID" ] || [ -z "$CLIENT_SECRET" ]; then
          echo "❌ Missing secrets!"
          exit 1
        fi
        
        # Get token
        TOKEN_RESPONSE=$(curl -s -f \
          -X POST https://api.pipedream.com/v1/oauth/token \
          -u "${CLIENT_ID}:${CLIENT_SECRET}" \
          -d 'grant_type=client_credentials')
        
        ACCESS_TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.access_token')
        echo "✅ Token: ${ACCESS_TOKEN:0:15}..."
        echo "token=$ACCESS_TOKEN" >> $GITHUB_OUTPUT

    - name: 🔍 Check proj_AVsiPRB
      env:
        ACCESS_TOKEN: ${{ steps.token.outputs.token }}
      run: |
        PROJECT_ID="proj_AVsiPRB"
        echo "::group::Project $PROJECT_ID"
        
        PROJ_RESPONSE=$(curl -s -f \
          -H "Authorization: Bearer $ACCESS_TOKEN" \
          "https://api.pipedream.com/v1/projects/$PROJECT_ID")
        
        if echo "$PROJ_RESPONSE" | jq -e '.id' > /dev/null; then
          echo "✅ EXISTS"
          echo "ID: $(echo "$PROJ_RESPONSE" | jq -r '.id')"
          echo "Name: $(echo "$PROJ_RESPONSE" | jq -r '.name')"
          echo "Status: $(echo "$PROJ_RESPONSE" | jq -r '.status')"
        else
          echo "❌ NOT FOUND"
          echo "Response: $PROJ_RESPONSE"
        fi
        echo "::endgroup::"
