name: Test Pipedream OAuth
on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Test Pipedream Client
      env:
        CLIENT_ID: ${{ secrets.PIPEDREAM_CLIENT_ID }}
        CLIENT_SECRET: ${{ secrets.PIPEDREAM_CLIENT_SECRET }}
      run: |
        curl -X POST https://api.pipedream.com/oauth/token \
          -d "client_id=$CLIENT_ID" \
          -d "client_secret=$CLIENT_SECRET" \
          -d "grant_type=client_credentials" \
          -H "Content-Type: application/x-www-form-urlencoded"
