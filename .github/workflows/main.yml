name: 🔍 Pipedream Test
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: 🔍 Test API
      id: api
      run: |
        RESPONSE=$(curl -k -s -w "\nSTATUS:%{http_code}" \
          -X POST https://o_zwIrG4g.m.pipedream.net \
          -H "Content-Type: application/json" \
          -d '{"client_id":"${{ secrets.CLIENT_ID }}","test":true}')
        echo "$RESPONSE" > result.txt
        STATUS=$(echo "$RESPONSE" | grep STATUS | cut -d: -f2-)
        echo "status=$STATUS" >> $GITHUB_OUTPUT
        echo "body=$(cat result.txt)" >> $GITHUB_OUTPUT
    
    - name: 📊 Summary
      run: |
        echo "✅ Status Code: ${{ steps.api.outputs.status }}"
        echo "📄 Response: ${{ steps.api.outputs.body }}"
        echo -e "# Pipedream\n**Status:** ${{ steps.api.outputs.status }}\n\`\`\`json\n${{ steps.api.outputs.body }}\n\`\`\`" >> $GITHUB_STEP_SUMMARY
    
    # Artifact به جای git push
    - name: 💾 Upload Report
      uses: actions/upload-artifact@v4
      with:
        name: pipedream-report
        path: result.txt
