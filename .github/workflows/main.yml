name: 🔗 GitHub Sources (Full Log)
on: [push]
jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
    - name: 🔐 Get Token
      id: token
      env:
        CLIENT_ID: ${{ secrets.PIPEDREAM_CLIENT_ID }}
        CLIENT_SECRET: ${{ secrets.PIPEDREAM_CLIENT_SECRET }}
      run: |
        echo "=== TOKEN ==="
        RESPONSE=$(curl -v -s \
          -X POST https://api.pipedream.com/v1/oauth/token \
          -u "${CLIENT_ID}:${CLIENT_SECRET}" \
          -d 'grant_type=client_credentials')
        echo "$RESPONSE"
        TOKEN=$(echo "$RESPONSE" | jq -r '.access_token')
        echo "TOKEN: ${TOKEN:0:10}..."
        echo "token=$TOKEN" >> $GITHUB_OUTPUT

    - name: 📋 ALL Sources
      env:
        ACCESS_TOKEN: ${{ steps.token.outputs.token }}
      run: |
        echo "=== SOURCES API ==="
        RESPONSE=$(curl -v -s \
          -H "Authorization: Bearer $ACCESS_TOKEN" \
          https://api.pipedream.com/v1/sources)
        echo "STATUS: $(echo "$RESPONSE" | head -1)"
        echo "$RESPONSE" | jq .
        
        echo "=== GITHUB SOURCES ==="
        echo "$RESPONSE" | jq '.data[]? | select(.source_type? == "github") | {id, name, repo}'
        
        COUNT=$(echo "$RESPONSE" | jq '.data | length // empty')
        echo "📊 Total sources: ${COUNT:-0}"
