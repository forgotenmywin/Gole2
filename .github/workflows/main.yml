name: 📋 List Projects (Verbose)
on: [push]
jobs:
  list:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: 📦 Install jq
      run: sudo apt-get update && sudo apt-get install -y jq

    - name: 🔐 Get Token
      id: token
      env:
        CLIENT_ID: ${{ secrets.PIPEDREAM_CLIENT_ID }}
        CLIENT_SECRET: ${{ secrets.PIPEDREAM_CLIENT_SECRET }}
      run: |
        echo "::group::Token Request"
        curl -v \
          -X POST https://api.pipedream.com/v1/oauth/token \
          -u "${CLIENT_ID}:${CLIENT_SECRET}" \
          -d 'grant_type=client_credentials'
        echo "::endgroup::"
        
        RESPONSE=$(curl -s \
          -X POST https://api.pipedream.com/v1/oauth/token \
          -u "${CLIENT_ID}:${CLIENT_SECRET}" \
          -d 'grant_type=client_credentials')
        TOKEN=$(echo "$RESPONSE" | jq -r '.access_token')
        echo "TOKEN=${TOKEN:0:20}..." >> $GITHUB_ENV
        echo "✅ Token ready"

    - name: 📋 List Projects
      run: |
        echo "::group::ALL PROJECTS"
        echo "🔍 Calling: https://api.pipedream.com/v1/projects"
        
        curl -v -s \
          -H "Authorization: Bearer $TOKEN" \
          https://api.pipedream.com/v1/projects | jq .
        
        echo "::endgroup::"
        
        # Summary
        RESPONSE=$(curl -s \
          -H "Authorization: Bearer $TOKEN" \
          https://api.pipedream.com/v1/projects)
        
        COUNT=$(echo "$RESPONSE" | jq '.data | length')
        echo "📊 Total: $COUNT projects"
        
        echo "$RESPONSE" | jq -r '.data[] | "\(.id) → \(.name)"'
