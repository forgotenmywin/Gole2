name: 🔍 Client ID Debug
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: 📋 Full Debug
      env:
        CID: ${{ secrets.CLIENT_ID }}
        CS: ${{ secrets.CLIENT_SECRET }}
      run: |
        echo "::group::🔍 Secrets Debug"
        echo "CLIENT_ID: $CID"
        echo "Length: ${#CID}"
        echo "Secret chars: ${#CS}"
        echo "::endgroup::"
        
        echo "::group::🌐 Client API Test"
        curl -v -s "https://api.pipedream.com/v1/clients/$CID" \
          -H "Authorization: Bearer $CS" \
          -w "STATUS:%{http_code}\n"
        echo "::endgroup::"
