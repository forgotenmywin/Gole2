name: Pipedream Project Check
on: [push]
jobs:
  check-project:
    runs-on: ubuntu-latest
    steps:
    - name: 🔐 Get OAuth Token
      id: oauth
      env:
        CLIENT_ID: ${{ secrets.PIPEDREAM_CLIENT_ID }}
        CLIENT_SECRET: ${{ secrets.PIPEDREAM_CLIENT_SECRET }}
      run: |
        echo "=== GET TOKEN ==="
        RESPONSE=$(curl -s -w "\nSTATUS:%{http_code}" \
          -X POST https://api.pipedream.com/v1/oauth/token \
          -u "${CLIENT_ID}:${CLIENT_SECRET}" \
          -d "grant_type=client_credentials")
        
        TOKEN=$(echo "$RESPONSE" | jq -r '.access_token')
        STATUS=$(echo "$RESPONSE" | tr -d '\n' | sed -e 's/.*STATUS://')
        
        echo "Status: $STATUS"
        echo "Token: ${TOKEN:0:20}..."
        echo "token=$TOKEN" >> $GITHUB_OUTPUT

    - name: 🔍 Check Project proj_AVsiPRB
      env:
        ACCESS_TOKEN: ${{ steps.oauth.outputs.token }}
        PROJECT_ID: proj_AVsiPRB
      run: |
        echo "=== CHECK $PROJECT_ID ==="
        curl -s -w "\nSTATUS: %{http_code}\n" \
          -H "Authorization: Bearer $ACCESS_TOKEN" \
          "https://api.pipedream.com/v1/projects/$PROJECT_ID" \
          | jq '.id, .name, .status // empty'
