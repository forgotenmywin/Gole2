name: Pipedream Test
on: 
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Test Auth
      env:
        ID: ${{ secrets.PIPEDREAM_CLIENT_ID }}
        SECRET: ${{ secrets.PIPEDREAM_CLIENT_SECRET }}
      run: |
        echo "ID: ${ID:0:8}..."
        echo "Secret OK: $([ -n "$SECRET" ] && echo yes || echo no)"
        
        curl -v -X POST https://api.pipedream.com/oauth/token \
          -d "client_id=$ID" \
          -d "client_secret=$SECRET" \
          -d "grant_type=client_credentials"
