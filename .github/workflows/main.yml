name: 🆕 Create Pipedream Workflow
on: [push]
jobs:
  create:
    runs-on: ubuntu-latest
    steps:
    - name: 😴 ۳۰s صبر
      run: sleep 30
    
    - name: 🔐 Get Token
      id: auth
      env:
        ID: ${{ secrets.PIPEDREAM_CLIENT_ID }}
        SECRET: ${{ secrets.PIPEDREAM_CLIENT_SECRET }}
      run: |
        TOKEN=$(curl -s -X POST -u "$ID:$SECRET" \
          -d "grant_type=client_credentials" \
          https://api.pipedream.com/v1/oauth/token | jq -r .access_token)
        echo "token=$TOKEN" >> $GITHUB_OUTPUT
    
    - name: 🆕 Create Workflow
      env:
        TOKEN: ${{ steps.auth.outputs.token }}
      run: |
        echo "=== CREATE WORKFLOW ==="
        curl -s -X POST -H "Authorization: Bearer $TOKEN" \
          -H "Content-Type: application/json" \
          https://api.pipedream.com/v1/workflows \
          -d '{
            "name": "GitHub Auto-Created 🎯",
            "description": "از GitHub Actions ساخته شد!",
            "source": {
              "http": "https://api.github.com/users/octocat"
            },
            "steps": [{
              "type": "node.js",
              "name": "Log Data",
              "code": "console.log(`Workflow ID: ${{ github.run_id }}`);"
            }]
          }' | jq '.data.id, .data.name'
        
        echo "✅ Workflow ساخته شد!"
