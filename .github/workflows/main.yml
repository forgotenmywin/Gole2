name: 🎥 Screen Record Bot
on: 
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install deps
      run: |
        sudo apt update -y
        sudo apt install -y xvfb ffmpeg -y
        
    - name: Setup Node (no cache)
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: false
    
    - name: Install packages
      run: |
        rm -f package*.json
        npm init -y
        npm install puppeteer@latest
        echo '{"type": "commonjs"}' >> package.json
    
    - name: Create record folder & instructions
      run: |
        mkdir -p record
        cat > instructions.txt << 'TXT_EOF'
        [type چطوری؟]
        [wait 2]
        [click 134 432]
        [type سلام! خوبم]
        [wait 3]
        [click 200 300]
        [type شاهکار بود]
        [wait 5]
        TXT_EOF
    
    - name: Create record.cjs
      run: |
        cat > record.cjs << 'JS_EOF'
        const puppeteer = require('puppeteer');
        const fs = require('fs/promises');

        (async () => {
          try {
            const data = await fs.readFile('./instructions.txt', 'utf8');
            const instructions = data.split('\n')
              .map(l => l.trim())
              .filter(l => l && l.startsWith('[') && l.endsWith(']'));
            
            console.log(`📋 ${instructions.length} دستور\n🎥 شروع...`);
            
            const browser = await puppeteer.launch({
              headless: false,
              args: ['--no-sandbox', '--disable-dev-shm-usage', '--disable-gpu']
            });
            
            const page = await browser.newPage();
            await page.setViewport({ width: 1366, height: 768 });
            await page.goto('https://chatgpt.com', { waitUntil: 'networkidle0' });
            
            await new Promise(resolve => setTimeout(resolve, 5000));
            console.log('🌐 صفحه لود شد');

            const selectors = [
              'textarea', '[contenteditable="true"]', '[data-id="root"] textarea',
              'div[contenteditable]', '.ProseMirror', 'prompt-textarea', '[role="textbox"]'
            ];

            for (let i = 0; i < instructions.length; i++) {
              const cmd = instructions[i];
              console.log(`🔄 #${i + 1}/${instructions.length}: ${cmd}`);
              
              if (cmd.startsWith('[type ')) {
                console.log('⌨️  جستجو input...');
                let found = false;
                
                for (const selector of selectors) {
                  try {
                    await page.waitForSelector(selector, { timeout: 3000 });
                    const el = await page.$(selector);
                    const box = await el.boundingBox();
                    console.log(`✅ ${selector} : (${Math.round(box.x)}, ${Math.round(box.y)}) ${Math.round(box.width)}x${Math.round(box.height)}`);
                    
                    await el.click();
                    const text = cmd.slice(6, -1);
                    await page.keyboard.type(text, { delay: 80 });
                    console.log(`✅ "${text}" تایپ شد`);
                    found = true;
                    break;
                  } catch(e) {}
                }
                
                if (!found) {
                  console.log('⚠️ input نبود → Enter');
                  await page.keyboard.press('Enter');
                }
                
              } else if (cmd.startsWith('[click ')) {
                const [x, y] = cmd.slice(7, -1).split(' ').map(Number);
                console.log(`🖱️ کلیک: (${x}, ${y})`);
                await page.mouse.click(x, y);
              } else if (cmd.startsWith('[wait ')) {
                const s = parseInt(cmd.slice(6, -1));
                console.log(`⏳ ${s}s...`);
                await new Promise(resolve => setTimeout(resolve, s * 1000));
              }
            }
            
            console.log('🏁 5 ثانیه دیگه ضبط → تمام!');
            await new Promise(resolve => setTimeout(resolve, 5000));
            await browser.close();
            console.log('✅ تمام!');
          } catch (e) {
            console.error('❌ خطا:', e.message);
            process.exit(1);
          }
        })();
        JS_EOF
    
    - name: Execute with Xvfb & FFmpeg
      run: |
        Xvfb :99 -screen 0 1366x768x24 -ac &
        export DISPLAY=:99
        sleep 5
        
        timeout 120s ffmpeg -f x11grab -s 1366x768 -r 25 -i :99.0 \
               -t 120 -c:v libx264 -pix_fmt yuv420p -crf 23 \
               -y ./record/demo_full.mp4 &
        
        FFMPEG_PID=$!
        sleep 5
        
        node record.cjs || true
        
        sleep 3
        kill $FFMPEG_PID 2>/dev/null || true
        pkill -f ffmpeg || true
        sleep 2
        
        # همه فایل‌ها رو به record منتقل کن
        mv *.mp4 record/ 2>/dev/null || true
        mv instructions.txt record/ 2>/dev/null || true
        mv record.cjs record/ 2>/dev/null || true
        mv package*.json record/ 2>/dev/null || true
        
        ls -la record/
        du -sh record/* || echo "هیچ فایلی نیست"
    
    - name: Commit record files to repo
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add record/*
        if git diff --staged --quiet; then
          echo "هیچ تغییری نیست"
        else
          git commit -m "🎥 Add screen recording files [skip ci]"
          git push
          echo "✅ فایل‌ها commit و push شد!"
        fi
    
    - uses: actions/upload-artifact@v4
      with:
        name: 🎥-complete
        path: record/
