name: Verify Pipedream & Save Result
on: [push]

jobs:
  test-pipedream:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Test Pipedream Connection
      id: test
      run: |
        RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://eo.o_zwIrG4g.m.pipedream.net" \
        -H "Content-Type: application/json" \
        -d '{
          "client_id": "OBYs9zkn8d1x2oYwtAinGLUGALPXD_zSBeQXfURuQKw",
          "workspace_id": "o_zwIrG4g",
          "name": "kingking00"
        }')
        
        HTTP_CODE=${RESPONSE##*$'\n'}
        BODY=${RESPONSE%$'\n'*}
        
        echo "HTTP Status: $HTTP_CODE" > pipedream-test.txt
        echo "Response: $BODY" >> pipedream-test.txt
        echo "Timestamp: $(date)" >> pipedream-test.txt
        
        if [ "$HTTP_CODE" = "200" ]; then
          echo "✅ Pipedream Connected!" >> pipedream-test.txt
        else
          echo "❌ Connection Failed!" >> pipedream-test.txt
        fi
        
        echo "file created: pipedream-test.txt"
    
    - name: Commit result
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add pipedream-test.txt
        git diff --staged --quiet || git commit -m "Pipedream test result [$(date)]"
        git push
