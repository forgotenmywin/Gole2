name: 🔍 Pipedream Test

on:
  push:

jobs:
  test-client-id:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Call Pipedream (test client_id)
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
        run: |
          set -e

          echo "Sending client_id to Pipedream..."
          echo "CLIENT_ID length: ${#CLIENT_ID}"  # فقط طول رو می‌زنیم که خود مقدار لو نره

          curl -k -sS -X POST "https://o_zwIrG4g.m.pipedream.net" \
            -H "Content-Type: application/json" \
            -d "{\"client_id\":\"${CLIENT_ID}\",\"test\":true}" \
            | tee result.txt

      - name: Summarize result
        run: |
          echo "✅ Status: $(cat result.txt)"

          echo "## Result" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`${{ '\n' }}" >> $GITHUB_STEP_SUMMARY
          cat result.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`${{ '\n' }}" >> $GITHUB_STEP_SUMMARY

      - name: Upload report (optional)
        uses: actions/upload-artifact@v4
        with:
          name: pipedream-report
          path: result.txt

