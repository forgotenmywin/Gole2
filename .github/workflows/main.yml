name: Pipedream Test 30s
on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: 🕐 30s WAIT + TEST
      env:
        ID: ${{ secrets.PIPEDREAM_CLIENT_ID }}
        SECRET: ${{ secrets.PIPEDREAM_CLIENT_SECRET }}
      run: |
        echo "😴 صبر ۳۰ ثانیه... بیا Actions!"
        sleep 30
        
        echo "=== CLIENT INFO ==="
        echo "ID: ${ID:0:12}..."
        echo "SECRET Length: ${#SECRET}"
        
        echo "=== CURL RESULT ==="
        curl -s -i -w "\n=== STATUS: %{http_code} ===" \
          -X POST https://api.pipedream.com/oauth/token \
          -d "client_id=$ID" \
          -d "client_secret=$SECRET" \
          -d "grant_type=client_credentials"
