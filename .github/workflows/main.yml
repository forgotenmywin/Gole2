name: 🆕 Create Pipedream Workflow FIXED
on: [push]
jobs:
  create:
    runs-on: ubuntu-latest
    steps:
    - name: 😴 ۳۰s صبر
      run: sleep 30
    
    - name: 🔐 Get Token
      id: auth
      env:
        ID: ${{ secrets.PIPEDREAM_CLIENT_ID }}
        SECRET: ${{ secrets.PIPEDREAM_CLIENT_SECRET }}
      run: |
        TOKEN=$(curl -s -X POST -u "$ID:$SECRET" \
          -d "grant_type=client_credentials" \
          https://api.pipedream.com/v1/oauth/token | jq -r .access_token)
        echo "token=$TOKEN" >> $GITHUB_OUTPUT
    
    - name: 🆕 Create Workflow
      env:
        TOKEN: ${{ steps.auth.outputs.token }}
      run: |
        echo "=== CREATE WORKFLOW ==="
        RESPONSE=$(curl -s -w "\nHTTP: %{http_code}" \
          -X POST -H "Authorization: Bearer $TOKEN" \
          -H "Content-Type: application/json" \
          https://api.pipedream.com/v1/workflows \
          -d '{
            "name": "GitHub Auto 🎯",
            "description": "ساخته شد: '"${{ github.run_id }}"'",
            "source": {"http": "https://httpbin.org/json"}
          }')
        echo "$RESPONSE" | jq .
        echo "✅ تمام!"
