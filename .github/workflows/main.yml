name: ✅ Project Status Check
on: [push]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
    - name: 📦 Install tools
      run: sudo apt-get update -qq && sudo apt-get install -y jq

    - name: 🔐 Token
      id: token
      env:
        CLIENT_ID: ${{ secrets.PIPEDREAM_CLIENT_ID }}
        CLIENT_SECRET: ${{ secrets.PIPEDREAM_CLIENT_SECRET }}
      run: |
        RESPONSE=$(curl -s \
          -X POST https://api.pipedream.com/v1/oauth/token \
          -u "${CLIENT_ID}:${CLIENT_SECRET}" \
          -d 'grant_type=client_credentials')
        echo "TOKEN OK"
        echo "$RESPONSE"
        TOKEN=$(echo "$RESPONSE" | jq -r '.access_token')
        echo "token=$TOKEN" >> $GITHUB_OUTPUT

    - name: 🔍 Project proj_AVsiPRB
      env:
        ACCESS_TOKEN: ${{ steps.token.outputs.token }}
      run: |
        echo "=== CHECKING proj_AVsiPRB ==="
        RESPONSE=$(curl -s -i \
          -H "Authorization: Bearer $ACCESS_TOKEN" \
          https://api.pipedream.com/v1/projects/proj_AVsiPRB)
        
        echo "=== FULL RESPONSE ==="
        echo "$RESPONSE"
        
        # Extract status
        HTTP_CODE=$(echo "$RESPONSE" | head -1 | cut -d' ' -f2)
        echo "HTTP STATUS: $HTTP_CODE"
        
        if echo "$RESPONSE" | grep -q '"id"'; then
          echo "✅ PROJECT EXISTS!"
          echo "$RESPONSE" | jq '.id, .name, .status'
        else
          echo "❌ PROJECT NOT FOUND"
        fi
