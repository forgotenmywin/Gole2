name: 🔍 Pipedream Project Debug
on: [push]
jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
    - name: 📦 Setup
      run: sudo apt-get update -qq && sudo apt-get install -y jq curl

    - name: 🔐 Get Token
      id: token
      env:
        CLIENT_ID: ${{ secrets.PIPEDREAM_CLIENT_ID }}
        CLIENT_SECRET: ${{ secrets.PIPEDREAM_CLIENT_SECRET }}
      run: |
        TOKEN_RESPONSE=$(curl -s \
          -X POST https://api.pipedream.com/v1/oauth/token \
          -u "${CLIENT_ID}:${CLIENT_SECRET}" \
          -d 'grant_type=client_credentials')
        echo "$TOKEN_RESPONSE"
        ACCESS_TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.access_token')
        echo "token=$ACCESS_TOKEN" >> $GITHUB_OUTPUT

    - name: 🔍 Check Project (FULL DEBUG)
      env:
        ACCESS_TOKEN: ${{ steps.token.outputs.token }}
      run: |
        PROJECT_ID="proj_AVsiPRB"
        echo "::group::DEBUG $PROJECT_ID"
        
        # Full response with headers & status
        RESPONSE=$(curl -s -i -w "HTTPSTATUS:%{http_code}" \
          -H "Authorization: Bearer $ACCESS_TOKEN" \
          "https://api.pipedream.com/v1/projects/$PROJECT_ID")
        
        echo "=== RAW RESPONSE ==="
        echo "$RESPONSE"
        
        HTTP_CODE=$(echo "$RESPONSE" | grep -o 'HTTPSTATUS:[0-9]*' | cut -d: -f2)
        BODY=$(echo "$RESPONSE" | sed '/HTTPSTATUS:/q')
        
        echo "HTTP: $HTTP_CODE"
        
        if [ "$HTTP_CODE" = "200" ]; then
          echo "✅ EXISTS"
          echo "$BODY" | jq .
        elif [ "$HTTP_CODE" = "404" ]; then
          echo "❌ NOT FOUND"
        else
          echo "❌ ERROR $HTTP_CODE"
        fi
        echo "::endgroup::"
