name: 🔗 Connect GitHub Repo to Pipedream
on: [push]
jobs:
  connect:
    runs-on: ubuntu-latest
    steps:
    - name: 🔐 OAuth Token
      id: token
      env:
        CLIENT_ID: ${{ secrets.PIPEDREAM_CLIENT_ID }}
        CLIENT_SECRET: ${{ secrets.PIPEDREAM_CLIENT_SECRET }}
      run: |
        TOKEN=$(curl -s \
          -X POST https://api.pipedream.com/v1/oauth/token \
          -u "${CLIENT_ID}:${CLIENT_SECRET}" \
          -d 'grant_type=client_credentials' | jq -r '.access_token')
        echo "token=$TOKEN" >> $GITHUB_OUTPUT

    - name: 📋 List Workflows (GitHub Sources)
      env:
        ACCESS_TOKEN: ${{ steps.token.outputs.token }}
      run: |
        echo "=== GitHub Sources ==="
        curl -s \
          -H "Authorization: Bearer $ACCESS_TOKEN" \
          https://api.pipedream.com/v1/sources | \
        jq '.data[]? | select(.source_type == "github") | {id, name, repo}'
        
    - name: 🔗 Check GitHub Webhook Status
      env:
        ACCESS_TOKEN: ${{ steps.token.outputs.token }}
      run: |
        # Pipedream GitHub App webhook status
        curl -s \
          -H "Authorization: Bearer $ACCESS_TOKEN" \
          https://api.pipedream.com/v1/sources/github | \
        jq '{sources: .data | length}'
