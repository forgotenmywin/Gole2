name: Pipedream FIXED
on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: ✅ CORRECT ENDPOINT
      env:
        ID: ${{ secrets.PIPEDREAM_CLIENT_ID }}
        SECRET: ${{ secrets.PIPEDREAM_CLIENT_SECRET }}
      run: |
        echo "ID: ${ID:0:12}... Length: ${#SECRET}"
        sleep 25
        
        # درست endpoint:
        curl -s -i -w "\nSTATUS: %{http_code}" \
          -X POST https://api.pipedream.com/v1/oauth/token \
          -H "Authorization: Basic $(echo -n $ID:$SECRET | base64)" \
          -d "grant_type=client_credentials"
